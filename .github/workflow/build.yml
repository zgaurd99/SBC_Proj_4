name: Build

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller SBC_Proj_4.spec

      - name: Zip build
        run: Compress-Archive -Path dist/SBC_Proj_4/* -DestinationPath SBC_Proj_4-windows.zip

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: SBC_Proj_4-windows.zip

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libgirepository1.0-dev pkg-config python3-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller SBC_Proj_4.spec

      - name: Zip build
        run: zip -r SBC_Proj_4-linux.zip dist/SBC_Proj_4/

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: SBC_Proj_4-linux.zip